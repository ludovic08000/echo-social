    <!-- JSON-LD: FAQPage (boost rich snippets) -->
    <script type="application/ld+json">
    {

      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Forsure est-il gratuit ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, Forsure est entièrement gratuit. L'inscription, la messagerie, le live streaming et toutes les fonctionnalités de base sont accessibles sans frais."
          }
        },
        {
          "@type": "Question",
          "name": "En quoi Forsure est différent de Facebook ou Instagram ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Forsure est un réseau social éthique sans publicité ni tracking. Contrairement à Facebook et Instagram, vos données ne sont pas vendues à des annonceurs. Votre vie privée est respectée par design."
          }
        },
        {
          "@type": "Question",
          "name": "Forsure est-il disponible sur mobile ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, Forsure est accessible sur tous les navigateurs mobiles et est optimisé comme une application web progressive (PWA). Des applications iOS et Android sont également disponibles."
          }
        },
        {
          "@type": "Question",
          "name": "Comment Forsure protège ma vie privée ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Forsure n'utilise aucun cookie de tracking, ne vend aucune donnée personnelle et ne diffuse aucune publicité ciblée. Les messages sont privés et les données restent sous votre contrôle."
          }
        }
      ]
    }
