name: Crypto and Multi-Device Test Suite

on:
  push:
    branches: [main]
    paths:
      - 'src/lib/crypto/**'
      - 'src/lib/messaging/**'
      - 'src/e2ee-session/**'
      - 'src/components/messages/**'
      - 'src/test/**'
      - 'package.json'
      - 'bun.lock'
      - 'package-lock.json'
      - 'vitest.config.ts'
      - '.github/workflows/crypto-tests.yml'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Run crypto and multi-device test suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run permanent multi-device regression suite
        id: multi_device_tests
        run: |
          mkdir -p test-results
          bun run test:multi-device -- \
            --reporter=default \
            --reporter=junit \
            --outputFile=test-results/multi-device-junit.xml 2>&1 | tee test-results/multi-device-output.log

      - name: Run crypto + messaging test suite
        id: tests
        run: |
          mkdir -p test-results
          bun run test:crypto -- \
            --reporter=default \
            --reporter=junit \
            --outputFile=test-results/crypto-junit.xml 2>&1 | tee test-results/crypto-output.log
          bun run test:messaging -- \
            --reporter=default \
            --reporter=junit \
            --outputFile=test-results/messaging-junit.xml 2>&1 | tee test-results/messaging-output.log

      - name: Upload test artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: crypto-test-results-${{ github.run_id }}
          path: |
            test-results/
            coverage/
          retention-days: 14
          if-no-files-found: warn
