name: Instant E2EE send patch

on:
  push:
    branches:
      - perf/instant-e2ee-send-v2

permissions:
  contents: write

jobs:
  patch-test-commit:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - uses: actions/checkout@v4
        with:
          ref: perf/instant-e2ee-send-v2
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Apply instant E2EE source patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected 1 anchor, found {count}')
              return text.replace(old, new, 1)

          def replace_between(text: str, start: str, end: str, new: str, label: str) -> str:
              a = text.find(start)
              if a < 0:
                  raise SystemExit(f'{label}: start anchor missing')
              b = text.find(end, a + len(start))
              if b < 0:
                  raise SystemExit(f'{label}: end anchor missing')
              return text[:a] + new + text[b + len(end):]

          queue_path = Path('src/hooks/useMessageQueueSignal.ts')
          queue = queue_path.read_text()

          queue = replace_once(
              queue,
              "import { buildFanoutCopies, type FanoutCopyRow } from '@/lib/messaging/multiDeviceFanout';\n",
              "import { buildFanoutCopies, type FanoutCopyRow } from '@/lib/messaging/multiDeviceFanout';\nimport { scheduleBackgroundFanoutCoverage } from '@/lib/messaging/fanoutRepair';\n",
              'queue fanout repair import',
          )

          queue = replace_once(
              queue,
              "const INLINE_ARCHIVE_BUDGET_MS = 2_000;\n\nfunction waitForInlineArchive(archivePromise: Promise<string | null>): Promise<string | null> {\n  return Promise.race([\n    archivePromise,\n    new Promise<null>((resolve) => setTimeout(() => resolve(null), INLINE_ARCHIVE_BUDGET_MS)),\n  ]);\n}\n\n",
              "",
              'remove inline archive wait',
          )

          helper_anchor = "function isMultiDeviceParentBody(value: string | null | undefined): value is string {\n  if (!value) return false;\n  try {\n    const parsed = JSON.parse(value);\n    return parsed?.encryptionMode === 'multi_device' && parsed?.ct === 'device_copies';\n  } catch {\n    return false;\n  }\n}\n"
          helper_new = helper_anchor + "\nexport function selectInitialDeliveryMode({\n  encryptionWasRequired,\n  resumedEncryptedBody,\n  preparedCopyCount,\n}: {\n  encryptionWasRequired: boolean;\n  resumedEncryptedBody?: string | null;\n  preparedCopyCount: number;\n}): 'multi_device' | 'direct' | 'plaintext' {\n  if (!encryptionWasRequired) return 'plaintext';\n  return isMultiDeviceParentBody(resumedEncryptedBody) && preparedCopyCount > 0\n    ? 'multi_device'\n    : 'direct';\n}\n"
          queue = replace_once(queue, helper_anchor, helper_new, 'delivery mode helper')

          queue = replace_once(
              queue,
              "          await deleteOutboxPayload(payload.localId).catch(() => {});\n          dispatchDecryptRetry(payload.reservedServerId);\n",
              "          scheduleBackgroundFanoutCoverage(payload.reservedServerId);\n          await deleteOutboxPayload(payload.localId).catch(() => {});\n          dispatchDecryptRetry(payload.reservedServerId);\n",
              'restore background fanout',
          )

          queue = replace_once(
              queue,
              "      status: resumePayload ? 'retry_pending' : 'encrypting',\n",
              "      status: resumePayload ? 'retry_pending' : 'sending',\n",
              'optimistic status',
          )

          core_start = "    const encryptionWasRequired = isEncryptionActive && !allowPlaintext;\n"
          core_end = "    updatePending({ status: 'sending', serverId: serverMessageId, lastError: null });\n"
          core_new = """    const encryptionWasRequired = isEncryptionActive && !allowPlaintext;
    const resumedEncryptedBody = resumePayload?.encryptedBody ?? null;
    const resumedPreparedCopies = (resumePayload?.preparedCopies ?? [])
      .filter(row => row.message_id === serverMessageId);
    const deliveryMode = selectInitialDeliveryMode({
      encryptionWasRequired,
      resumedEncryptedBody,
      preparedCopyCount: resumedPreparedCopies.length,
    });
    const resumedParent = deliveryMode === 'multi_device' ? resumedEncryptedBody : null;
    const resumedDirectBody = deliveryMode === 'direct' && resumedEncryptedBody && !isMultiDeviceParentBody(resumedEncryptedBody)
      ? resumedEncryptedBody
      : null;
    let transportPlaintext = resumePayload?.transportPlaintext ?? sanitized;
    let bodyToStore = resumedParent ?? resumedDirectBody ?? sanitized;
    let encryptedSuccessfully = encryptionWasRequired && Boolean(resumedParent || resumedDirectBody);
    const requiresLongAttachment = !isSpecial && utf8ByteLength(sanitized) > MAX_INLINE_MESSAGE_BODY_BYTES;

    if (requiresLongAttachment && !encryptionWasRequired) {
      const error = new Error('Les messages de plus de 2 Kio nécessitent une conversation chiffrée.');
      updatePending({ status: 'failed_visible', lastError: error.message });
      throw error;
    }

    if (encryptionWasRequired) {
      if (!isEncryptionReady) {
        try {
          trace('identity_cold_start');
          await ensureUserE2EEIdentity(user.id, { waitForMaintenance: false });
          trace('identity_cold_start_ready');
        } catch (error) {
          trace('identity_cold_start_failed_non_fatal', {
            error: error instanceof Error ? error.message : String(error),
          });
        }
      }

      if (requiresLongAttachment && !resumePayload?.transportPlaintext) {
        try {
          trace('long_message_upload_start', { bodyBytes: utf8ByteLength(sanitized) });
          const prepared = await prepareLongMessageForSend(sanitized, serverMessageId);
          transportPlaintext = prepared.transportBody;
          await persistOutbox({ transportPlaintext });
          trace('long_message_upload_ready', {
            previewBytes: utf8ByteLength(prepared.preview),
            transportBytes: utf8ByteLength(transportPlaintext),
          });
        } catch (longMessageError) {
          const message = longMessageError instanceof Error
            ? longMessageError.message
            : 'Préparation du message long impossible.';
          updatePending({ status: 'failed_visible', lastError: message });
          throw longMessageError instanceof Error ? longMessageError : new Error(message);
        }
      }

      if (deliveryMode === 'multi_device') {
        bodyToStore = resumedParent!;
        encryptedSuccessfully = true;
        await persistOutbox({
          encryptedBody: bodyToStore,
          transportPlaintext,
          preparedCopies: resumedPreparedCopies,
        });
        updatePending({ encryptedBody: bodyToStore, status: 'sending', lastError: null });
        await savePlaintextForCiphertext(bodyToStore, sanitized);
        trace('multidevice_resume_ready', {
          copyCount: resumedPreparedCopies.length,
          longMessage: requiresLongAttachment,
        });
      } else {
        if (!resumedDirectBody) {
          if (!encrypt) throw new Error('Chiffrement direct indisponible.');
          const directBody = await encrypt(transportPlaintext, localId);
          if (!directBody || directBody === transportPlaintext || isMultiDeviceParentBody(directBody)) {
            throw new Error('Enveloppe E2EE directe invalide.');
          }
          bodyToStore = directBody;
        }

        encryptedSuccessfully = true;
        await persistOutbox({
          encryptedBody: bodyToStore,
          transportPlaintext,
          preparedCopies: [],
        });
        updatePending({ encryptedBody: bodyToStore, status: 'sending', lastError: null });
        await savePlaintextForCiphertext(bodyToStore, sanitized);
        trace('direct_e2ee_ready', {
          bodyLength: bodyToStore.length,
          longMessage: requiresLongAttachment,
        });
      }
    }

    const fanoutInput = {
      messageId: serverMessageId,
      conversationId,
      senderUserId: user.id,
      plaintext: transportPlaintext,
    };
    let fanoutRows: FanoutCopyRow[] = deliveryMode === 'multi_device'
      ? resumedPreparedCopies
      : [];

    const archiveAllowed = isArchiveBackupEnabled() && shouldArchiveMessageBody({
      sanitized,
      isSpecial,
      viewOnce: extra?.view_once,
      encryptedSuccessfully,
      encryptionWasRequired,
    });
    const inlineArchiveBody = resumePayload?.archiveBody ?? null;
    const archivePromise = archiveAllowed && !inlineArchiveBody
      ? encryptArchive(sanitized, conversationId, user.id).catch(() => null)
      : Promise.resolve(inlineArchiveBody);

    if (deliveryMode === 'multi_device' && fanoutRows.length === 0) {
      throw new Error('E2EE_PREPARED_COPIES_MISSING');
    }

    updatePending({ status: 'sending', serverId: serverMessageId, lastError: null });
"""
          queue = replace_between(queue, core_start, core_end, core_new, 'replace critical send path')

          queue = replace_once(
              queue,
              "    if (encryptedSuccessfully) rpcExtra.body_kind = 'multi_device';\n",
              "    if (deliveryMode === 'multi_device') rpcExtra.body_kind = 'multi_device';\n",
              'rpc body kind',
          )

          queue = replace_once(
              queue,
              "      dispatchDecryptRetry(data.id);\n    }\n\n    if (archiveAllowed && !inlineArchiveBody) {\n",
              "      dispatchDecryptRetry(data.id);\n      scheduleBackgroundFanoutCoverage(data.id);\n    }\n\n    if (archiveAllowed && !inlineArchiveBody) {\n",
              'schedule post-send fanout',
          )

          queue = replace_once(
              queue,
              "        await deleteOutboxPayload(localId).catch(() => {});\n        setPendingMessages(prev => prev.filter(message => message.localId !== localId));\n        dispatchDecryptRetry(data.id);\n",
              "        scheduleBackgroundFanoutCoverage(data.id);\n        await deleteOutboxPayload(localId).catch(() => {});\n        setPendingMessages(prev => prev.filter(message => message.localId !== localId));\n        dispatchDecryptRetry(data.id);\n",
              'retry delivered background fanout',
          )

          queue = replace_once(
              queue,
              "    isInstant: !isEncryptionActive || allowPlaintext || isEncryptionReady,\n",
              "    isInstant: true,\n",
              'instant queue flag',
          )

          queue_path.write_text(queue)

          wrapper_path = Path('src/hooks/useMessageQueue.ts')
          wrapper = wrapper_path.read_text()
          wrapper = replace_once(
              wrapper,
              "  buildMultiDeviceParentEnvelope,\n} from './useMessageQueueSignal';\n\nexport { shouldArchiveMessageBody, buildMultiDeviceParentEnvelope };\n",
              "  buildMultiDeviceParentEnvelope,\n  selectInitialDeliveryMode,\n} from './useMessageQueueSignal';\n\nexport { shouldArchiveMessageBody, buildMultiDeviceParentEnvelope, selectInitialDeliveryMode };\n",
              'wrapper delivery mode export',
          )
          wrapper_path.write_text(wrapper)

          repair_path = Path('src/lib/messaging/fanoutRepair.ts')
          repair = repair_path.read_text()
          repair = replace_once(
              repair,
              "function scheduleBackgroundCoverage(messageId: string): void {\n",
              "export function scheduleBackgroundFanoutCoverage(messageId: string): void {\n",
              'export background fanout',
          )
          repair = replace_once(
              repair,
              "    const readinessDelays = [500, 1_500, 3_000];\n",
              "    const readinessDelays = [0, 250, 750];\n",
              'background fanout delays',
          )
          repair = replace_once(
              repair,
              "  const marker = '__forsureFanoutCoverageListenerV1';\n",
              "  const marker = '__forsureFanoutCoverageListenerV2';\n",
              'fanout listener marker',
          )
          repair = replace_once(
              repair,
              "      if (messageId) scheduleBackgroundCoverage(messageId);\n",
              "      if (messageId) scheduleBackgroundFanoutCoverage(messageId);\n",
              'fanout listener call',
          )
          repair_path.write_text(repair)

          fanout_path = Path('src/lib/messaging/multiDeviceFanout.ts')
          fanout = fanout_path.read_text()
          fanout = replace_once(
              fanout,
              "\n  await supabase.from('messages').update({ body_kind: 'multi_device' } as any).eq('id', input.messageId);\n  return { inserted: rows.length, multiDevice: true };\n",
              "\n  // Device copies are auxiliary to the encrypted parent. Do not rewrite the\n  // parent's routing kind after a direct E2EE fast-path send.\n  return { inserted: rows.length, multiDevice: true };\n",
              'preserve direct parent kind',
          )
          fanout_path.write_text(fanout)

          e2ee_path = Path('src/hooks/useE2EE.ts')
          e2ee = e2ee_path.read_text()
          e2ee = replace_once(
              e2ee,
              "          if (!cancelled) console.debug('[E2EE] session prewarmed on conversation open');\n        } catch {\n          /* non-fatal — first send will establish lazily */\n        }\n      })();\n    }, 500);\n",
              "          if (!cancelled) console.debug('[E2EE] session prewarmed on conversation open');\n        } catch {\n          /* non-fatal — first send will establish lazily */\n        }\n      })();\n    }, 0);\n",
              'immediate direct ratchet prewarm',
          )
          e2ee_path.write_text(e2ee)

          test_path = Path('src/hooks/__tests__/useMessageQueueArchive.test.ts')
          test = test_path.read_text()
          test = replace_once(
              test,
              "import { buildMultiDeviceParentEnvelope, shouldArchiveMessageBody } from '../useMessageQueue';\n",
              "import { buildMultiDeviceParentEnvelope, selectInitialDeliveryMode, shouldArchiveMessageBody } from '../useMessageQueue';\n",
              'test import',
          )
          test = replace_once(
              test,
              "  it('builds a valid encrypted-only multi-device parent envelope', () => {\n",
              "  it('uses direct E2EE immediately for a fresh encrypted send', () => {\n    expect(selectInitialDeliveryMode({\n      encryptionWasRequired: true,\n      resumedEncryptedBody: null,\n      preparedCopyCount: 0,\n    })).toBe('direct');\n  });\n\n  it('resumes Sesame only when exact prepared copies are already durable', () => {\n    const parent = buildMultiDeviceParentEnvelope('local-resume', 'trace-resume');\n    expect(selectInitialDeliveryMode({\n      encryptionWasRequired: true,\n      resumedEncryptedBody: parent,\n      preparedCopyCount: 2,\n    })).toBe('multi_device');\n    expect(selectInitialDeliveryMode({\n      encryptionWasRequired: true,\n      resumedEncryptedBody: parent,\n      preparedCopyCount: 0,\n    })).toBe('direct');\n  });\n\n  it('keeps Zeus plaintext mode explicit', () => {\n    expect(selectInitialDeliveryMode({\n      encryptionWasRequired: false,\n      resumedEncryptedBody: null,\n      preparedCopyCount: 0,\n    })).toBe('plaintext');\n  });\n\n  it('builds a valid encrypted-only multi-device parent envelope', () => {\n",
              'delivery mode tests',
          )
          test_path.write_text(test)
          PY
      - name: Install dependencies
        run: npm ci
      - name: Lint changed files
        run: npx eslint src/hooks/useMessageQueueSignal.ts src/hooks/useMessageQueue.ts src/hooks/useE2EE.ts src/lib/messaging/fanoutRepair.ts src/lib/messaging/multiDeviceFanout.ts src/hooks/__tests__/useMessageQueueArchive.test.ts
      - name: Run messaging regression tests
        run: npx vitest run src/hooks/__tests__/useMessageQueueArchive.test.ts src/lib/messaging/__tests__/outboxVault.test.ts src/lib/messaging/__tests__/sesameSendRpc.test.ts src/lib/crypto/mediaEncrypt.test.ts src/components/messages/__tests__/decryptedMediaCache.test.ts
      - name: Production build
        run: npm run build
      - name: Commit validated patch
        shell: bash
        run: |
          rm .github/workflows/instant-e2ee-send-patch.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hooks/useMessageQueueSignal.ts src/hooks/useMessageQueue.ts src/hooks/useE2EE.ts src/lib/messaging/fanoutRepair.ts src/lib/messaging/multiDeviceFanout.ts src/hooks/__tests__/useMessageQueueArchive.test.ts .github/workflows/instant-e2ee-send-patch.yml
          git commit -m "perf(messages): make direct E2EE send immediate"
          git push origin HEAD:perf/instant-e2ee-send-v2
