name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  harden-pr30:
    if: github.event_name == 'pull_request' && github.head_ref == 'fix/encrypted-media-black-bubble'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reviewed production hardening
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import subprocess
          import traceback

          diagnostic = Path('PR30_HARDENING_ERROR.txt')
          if diagnostic.exists():
              print(diagnostic.read_text())
              raise SystemExit('A captured hardening failure is awaiting correction')

          workflow = Path('.github/workflows/pr30-production-hardening.yml').read_text()
          start_marker = "          python3 <<'PY'\n"
          end_marker = "\n          PY\n\n      - name: Install dependencies"
          if start_marker not in workflow or end_marker not in workflow:
              raise SystemExit('Production hardening payload markers are missing')
          raw_payload = workflow.split(start_marker, 1)[1].split(end_marker, 1)[0]

          normalized_lines = []
          in_triple_literal = False
          for raw_line in raw_payload.splitlines():
              line = raw_line
              if not in_triple_literal and line.startswith('          '):
                  line = line[10:]
              normalized_lines.append(line)
              triple_count = line.count("'''") + line.count('"""')
              if triple_count % 2 == 1:
                  in_triple_literal = not in_triple_literal
          payload = '\n'.join(normalized_lines)
          payload = payload.replace('\\n\\nfunction encryptedPayloadKind",', '\\n\\n",')

          try:
              exec(compile(payload, 'pr30-production-hardening.py', 'exec'))
          except BaseException:
              failure = traceback.format_exc()
              subprocess.run(['git', 'reset', '--hard', 'HEAD'], check=True)
              diagnostic.write_text(failure)
              subprocess.run(['git', 'config', 'user.name', 'github-actions[bot]'], check=True)
              subprocess.run(['git', 'config', 'user.email', '41898282+github-actions[bot]@users.noreply.github.com'], check=True)
              subprocess.run(['git', 'add', str(diagnostic)], check=True)
              subprocess.run(['git', 'commit', '-m', 'ci: capture PR30 hardening failure'], check=True)
              subprocess.run(['git', 'push', 'origin', 'HEAD:fix/encrypted-media-black-bubble'], check=True)
              print(failure)
              raise
          PY

      - name: Install dependencies
        run: npm ci

      - name: Validate, save and push hardened implementation
        shell: bash
        run: |
          set +e
          validation_log=/tmp/pr30-validation.log
          : > "$validation_log"

          npm run lint 2>&1 | tee -a "$validation_log"
          lint_status=${PIPESTATUS[0]}

          test_status=0
          if [ "$lint_status" -eq 0 ]; then
            npm run test 2>&1 | tee -a "$validation_log"
            test_status=${PIPESTATUS[0]}
          fi

          build_status=0
          if [ "$lint_status" -eq 0 ] && [ "$test_status" -eq 0 ]; then
            npm run build 2>&1 | tee -a "$validation_log"
            build_status=${PIPESTATUS[0]}
          fi

          status=0
          if [ "$lint_status" -ne 0 ] || [ "$test_status" -ne 0 ] || [ "$build_status" -ne 0 ]; then
            status=1
          fi

          git fetch origin main
          git checkout origin/main -- .github/workflows/e2ee-ci.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ "$status" -ne 0 ]; then
            cp "$validation_log" PR30_VALIDATION_ERROR.txt
            commit_message="wip(messages): save hardened E2EE implementation for validation"
          else
            rm -f PR30_VALIDATION_ERROR.txt PR30_HARDENING_ERROR.txt
            commit_message="fix(messages): harden atomic E2EE media delivery"
          fi

          git add -A
          git commit -m "$commit_message"
          git push origin HEAD:fix/encrypted-media-black-bubble
          exit "$status"
