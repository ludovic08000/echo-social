name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  trace-sender-lookup:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout optimization branch
        uses: actions/checkout@v4
        with:
          ref: perf/signal-resource-optimization
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instrument sender lookup
        run: python3 scripts/instrument-sender-lookup.py

      - name: Install dependencies
        run: npm ci

      - name: Capture sender lookup trace
        shell: bash
        run: |
          set +e
          npx vitest run src/components/messages/__tests__/decryptionNegativeCache.test.ts --reporter=verbose 2>&1 | tee sender-lookup-trace.txt
          echo "TEST_EXIT=${PIPESTATUS[0]}" | tee -a sender-lookup-trace.txt

      - name: Restore workflow and commit trace only
        shell: bash
        run: |
          git checkout -- src/components/messages/decryptionService.ts
          cat > .github/workflows/e2ee-ci.yml <<'YAML'
          name: E2EE CI

          on:
            push:
              branches: [main]
            pull_request:
              branches: [main]
            workflow_dispatch:

          jobs:
            verify:
              runs-on: ubuntu-latest
              timeout-minutes: 20

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm

                - name: Install dependencies
                  run: npm ci

                - name: Lint
                  run: npm run lint

                - name: Test
                  run: npm run test

                - name: Build
                  run: npm run build
          YAML
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f scripts/instrument-sender-lookup.py
          git add .github/workflows/e2ee-ci.yml sender-lookup-trace.txt
          git commit -m "test(messaging): capture sender lookup trace"
          git push origin HEAD:perf/signal-resource-optimization

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
