name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (incremental baseline)
        shell: bash
        run: |
          set +e
          npm run lint -- --format json --output-file eslint-report.json
          eslint_status=$?
          set -e

          node scripts/check-eslint-baseline.mjs eslint-report.json

          if [ "$eslint_status" -gt 1 ]; then
            echo "ESLint failed to execute correctly (exit $eslint_status)."
            exit "$eslint_status"
          fi

      - name: Test
        id: tests
        shell: bash
        run: |
          set +e
          npx vitest run --reporter=json --outputFile=vitest-report.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload Vitest report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: vitest-report.json
          if-no-files-found: error
          retention-days: 2

      - name: Enforce tests
        if: always()
        run: test "${{ steps.tests.outputs.exit_code }}" = "0"

      - name: Build
        run: npm run build
