name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-final-signal-optimization:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout optimization branch
        uses: actions/checkout@v4
        with:
          ref: perf/signal-resource-optimization
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Fix Supabase test mock signature
        run: python3 scripts/fix-supabase-in-test-mock.py

      - name: Install dependencies
        run: npm ci

      - name: Messaging regression tests
        run: npx vitest run src/hooks/__tests__/useMessageQueueArchive.test.ts src/components/messages/__tests__/decryptionServiceMultiDevice.test.ts src/components/messages/__tests__/decryptionNegativeCache.test.ts

      - name: Production build
        run: npm run build

      - name: Restore standard workflow and commit validated tree
        shell: bash
        run: |
          cat > .github/workflows/e2ee-ci.yml <<'YAML'
          name: E2EE CI

          on:
            push:
              branches: [main]
            pull_request:
              branches: [main]
            workflow_dispatch:

          jobs:
            verify:
              runs-on: ubuntu-latest
              timeout-minutes: 20

              steps:
                - name: Checkout
                  uses: actions/checkout@v4

                - name: Setup Node
                  uses: actions/setup-node@v4
                  with:
                    node-version: 22
                    cache: npm

                - name: Install dependencies
                  run: npm ci

                - name: Lint
                  run: npm run lint

                - name: Test
                  run: npm run test

                - name: Build
                  run: npm run build
          YAML
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f scripts/fix-supabase-in-test-mock.py
          git rm -f final-signal-resource-validation.txt 2>/dev/null || true
          git add .github/workflows/e2ee-ci.yml src/components/messages/__tests__/decryptionNegativeCache.test.ts
          git commit -m "test(messaging): correct Supabase sender lookup mock"
          git push origin HEAD:perf/signal-resource-optimization

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
