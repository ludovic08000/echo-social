name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  apply-e2ee-direct-fallback:
    if: github.event_name == 'pull_request' && github.head_ref == 'hotfix/e2ee-direct-fallback'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout hotfix branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reviewed hotfix payload
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          import textwrap

          workflow = Path('.github/workflows/e2ee-direct-fallback-hotfix.yml').read_text()
          start = "          python3 <<'PY'\n"
          end = "\n          PY\n      - run: npm ci"
          if start not in workflow or end not in workflow:
              raise SystemExit('hotfix payload markers missing')
          payload = workflow.split(start, 1)[1].split(end, 1)[0]
          exec(compile(textwrap.dedent(payload), 'e2ee-direct-fallback-hotfix.py', 'exec'))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Lint hotfix source
        run: npx eslint src/hooks/useMessageQueueSignal.ts

      - name: Regression tests
        run: npx vitest run src/hooks/__tests__/useMessageQueueArchive.test.ts src/lib/messaging/__tests__/outboxVault.test.ts src/lib/messaging/__tests__/sesameSendRpc.test.ts src/lib/crypto/mediaEncrypt.test.ts src/components/messages/__tests__/decryptedMediaCache.test.ts

      - name: Production build
        run: npm run build

      - name: Commit validated hotfix
        shell: bash
        run: |
          rm .github/workflows/e2ee-direct-fallback-hotfix.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hooks/useMessageQueueSignal.ts .github/workflows/e2ee-direct-fallback-hotfix.yml
          git commit -m "fix(messages): fall back to direct E2EE when device fanout is unavailable"
          git push origin HEAD:hotfix/e2ee-direct-fallback
