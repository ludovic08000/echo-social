name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint hardened files (diagnostic)
        continue-on-error: true
        run: >-
          npx eslint
          src/e2ee-session/deviceRegistry.ts
          src/hooks/useDeviceLink.ts
          src/lib/crypto/deviceRatchet.ts
          src/lib/crypto/plaintextStore.ts
          src/lib/crypto/x3dh.ts
          src/lib/messaging/multiDeviceFanout.ts
          src/lib/crypto/__tests__/signalProtocolHardening.test.ts
          --format json --output-file eslint-hardening.json

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-hardening
          path: eslint-hardening.json
          retention-days: 1

      - name: Test hardened ratchet
        run: npm run test -- src/lib/crypto/__tests__/signalProtocolHardening.test.ts

      - name: Build
        run: npm run build
