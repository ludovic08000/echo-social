name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

  apply-instant-e2ee-send:
    if: github.event_name == 'pull_request' && github.head_ref == 'perf/instant-e2ee-send-v2' && github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Checkout performance branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reviewed source patch
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          workflow_path = Path('.github/workflows/instant-e2ee-send-patch.yml')
          lines = workflow_path.read_text().splitlines()
          start = next(i for i, line in enumerate(lines) if line.strip() == "python3 <<'PY'")
          end = next(i for i in range(start + 1, len(lines)) if lines[i].strip() == 'PY')
          payload = '\n'.join(
              line[10:] if line.startswith('          ') else line
              for line in lines[start + 1:end]
          )
          exec(compile(payload, 'instant-e2ee-send-patch.py', 'exec'))
          PY

      - name: Install dependencies
        run: npm ci

      - name: Lint changed clean modules
        run: npx eslint src/hooks/useMessageQueueSignal.ts src/hooks/useMessageQueue.ts src/lib/messaging/fanoutRepair.ts src/hooks/__tests__/useMessageQueueArchive.test.ts

      - name: Messaging regression tests
        run: npx vitest run src/hooks/__tests__/useMessageQueueArchive.test.ts src/lib/messaging/__tests__/outboxVault.test.ts src/lib/messaging/__tests__/sesameSendRpc.test.ts src/lib/crypto/mediaEncrypt.test.ts src/components/messages/__tests__/decryptedMediaCache.test.ts

      - name: Production build
        run: npm run build

      - name: Commit validated performance patch
        shell: bash
        run: |
          rm .github/workflows/instant-e2ee-send-patch.yml
          rm -f INSTANT_E2EE_LINT.txt INSTANT_E2EE_TRIGGER.txt
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hooks/useMessageQueueSignal.ts src/hooks/useMessageQueue.ts src/hooks/useE2EE.ts src/lib/messaging/fanoutRepair.ts src/lib/messaging/multiDeviceFanout.ts src/hooks/__tests__/useMessageQueueArchive.test.ts .github/workflows/instant-e2ee-send-patch.yml INSTANT_E2EE_LINT.txt INSTANT_E2EE_TRIGGER.txt
          git commit -m "perf(messages): make direct E2EE send immediate"
          git push origin HEAD:perf/instant-e2ee-send-v2
