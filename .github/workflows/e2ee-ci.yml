name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply hardening follow-up once
        if: github.event_name == 'pull_request' && github.actor != 'github-actions[bot]'
        run: |
          node scripts/finalize-signal-hardening.mjs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if ! git diff --cached --quiet; then
            git commit -m "fix(e2ee): finalize Signal invariant hardening"
            git push origin HEAD:${{ github.head_ref }}
          fi

      - name: Install dependencies
        run: npm ci

      - name: Lint hardened files
        run: >-
          npx eslint
          src/e2ee-session/deviceRegistry.ts
          src/hooks/useDeviceLink.ts
          src/lib/crypto/deviceRatchet.ts
          src/lib/crypto/plaintextStore.ts
          src/lib/crypto/x3dh.ts
          src/lib/messaging/multiDeviceFanout.ts
          src/lib/crypto/__tests__/signalProtocolHardening.test.ts

      - name: Test hardened ratchet
        run: npm run test -- src/lib/crypto/__tests__/signalProtocolHardening.test.ts

      - name: Build
        run: npm run build
