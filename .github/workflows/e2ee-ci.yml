name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        id: lint
        shell: bash
        run: |
          set +e
          npm run lint -- --format json --output-file eslint-report.json
          code=$?
          echo "exit_code=$code" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Upload ESLint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eslint-report
          path: eslint-report.json
          if-no-files-found: error
          retention-days: 1

      - name: Enforce lint
        if: always()
        run: test "${{ steps.lint.outputs.exit_code }}" = "0"

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
