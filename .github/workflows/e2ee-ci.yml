name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (incremental baseline)
        shell: bash
        run: |
          set +e
          npm run lint -- --format json --output-file eslint-report.json
          eslint_status=$?
          set -e

          node scripts/check-eslint-baseline.mjs eslint-report.json

          if [ "$eslint_status" -gt 1 ]; then
            echo "ESLint failed to execute correctly (exit $eslint_status)."
            exit "$eslint_status"
          fi

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build
