name: E2EE CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref_name }}
          fetch-depth: 0

      - name: Apply one-shot audited delivery patch
        if: github.actor != 'github-actions[bot]'
        run: python3 scripts/apply-e2ee-audit-fixes.py

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (incremental baseline)
        shell: bash
        run: |
          set +e
          npm run lint -- --format json --output-file eslint-report.json
          eslint_status=$?
          set -e

          node scripts/check-eslint-baseline.mjs eslint-report.json

          if [ "$eslint_status" -gt 1 ]; then
            echo "ESLint failed to execute correctly (exit $eslint_status)."
            exit "$eslint_status"
          fi

      - name: Test
        run: npm run test

      - name: Build
        run: npm run build

      - name: Commit audited delivery fixes
        if: github.actor != 'github-actions[bot]'
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No generated patch to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hooks/useMessageQueueSignal.ts src/lib/messaging/multiDeviceFanout.ts src/lib/crypto/deviceRatchet.ts src/hooks/useDeviceRegistration.ts src/lib/crypto/signedDeviceList.ts
          git diff --cached --check
          git commit -m "fix(e2ee): stabilize iOS Windows device delivery"
          git push origin HEAD:agent/cryptography-hardening
