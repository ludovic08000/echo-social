      return 'image/heic';
    }
    if (brands.has('qt  ')) return 'video/quicktime';
    return 'video/mp4';
  }
"""
          text = replace_once(text, old_ftyp, new_ftyp, 'ISO BMFF compatible brands')
          old_unpack = """  const mime = normalizeMimeType(textDecoder.decode(decrypted.slice(PAYLOAD_HEADER_BYTES, dataOffset)));
  const fileBytes = decrypted.slice(dataOffset);
