name: PR Build

on:
  push:
    branches: ['fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
      - name: Targeted media tests
        run: npm run test -- src/lib/crypto/mediaEncrypt.test.ts
