name: PR Build

on:
  push:
    branches: ['fix/**']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  verify-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci --silent
      - name: Build
        id: build
        continue-on-error: true
        run: npm run build > build.log 2>&1
      - name: Build diagnostics
        if: always()
        run: tail -n 120 build.log || true
      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics
          path: build.log
          retention-days: 1
      - name: Targeted media tests
        if: steps.build.outcome == 'success'
        run: npm run test -- src/lib/crypto/mediaEncrypt.test.ts
      - name: Fail when build failed
        if: steps.build.outcome == 'failure'
        run: exit 1
