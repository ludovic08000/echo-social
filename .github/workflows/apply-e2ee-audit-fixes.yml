name: Apply audited E2EE delivery fixes

on:
  push:
    branches: [agent/cryptography-hardening]

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/cryptography-hardening
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reviewed patches
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          def read(path):
              return Path(path).read_text(encoding='utf-8-sig')

          def write(path, text):
              Path(path).write_text(text, encoding='utf-8')

          def replace_once(path, old, new):
              text = read(path)
              count = text.count(old)
              if count != 1:
                  raise RuntimeError(f'{path}: expected one match, got {count}: {old[:100]!r}')
              write(path, text.replace(old, new, 1))

          # 1) New outbound traffic is device-copy v5 only. The old conversation
          # ratchet remains inbound-only for historical messages.
          path = 'src/hooks/useMessageQueueSignal.ts'
          text = read(path)
          start = text.index('      if (!encrypt) {')
          end = text.index("    } else {\n      trace('encryption_not_required');", start)
          replacement = '''      try {
        const identityKeys = await getOrCreateIdentityKeys(user.id);
        const publicBundle = await exportPublicKeyBundle(identityKeys);
        if (!publicBundle.identityKey || !publicBundle.signingKey) {
          throw new Error('Identité E2EE incomplète — envoi différé.');
        }

        // New traffic is carried exclusively by per-device X3DH5/Double-Ratchet
        // copies. The parent row is only a non-secret routing marker.
        bodyToStore = buildMultiDeviceParentEnvelope(localId, traceId);
        encryptedSuccessfully = true;
        trace('device_fanout_parent_ready', {
          bodyKind: 'multi_device',
          bodyLength: bodyToStore.length,
        });
      } catch (encryptError) {
        const errMsg = encryptError instanceof Error ? encryptError.message : String(encryptError);
        trace('device_fanout_identity_failed', { error: errMsg });
        updatePending({ encryptedBody: null, status: 'waiting_secure_channel', lastError: errMsg });
        throw encryptError instanceof Error ? encryptError : new Error(errMsg);
      }
'''
          text = text[:start] + replacement + text[end:]

          start = text.index('    if (encryptedSuccessfully) {\n      fanoutPromise = buildFanoutCopies')
          end = text.index('\n\n    const inlineArchiveBody', start)
          replacement = '''    if (encryptedSuccessfully) {
      fanoutPromise = buildFanoutCopies(fanoutInput);
      trace('fanout_strict_start', { serverMessageId, budgetMs: INLINE_FANOUT_BUDGET_MS });
      const inlineFanout = await waitForInlineFanout(fanoutPromise).catch((fanoutError) => {
        trace('fanout_strict_failed', {
          error: fanoutError instanceof Error ? fanoutError.message : String(fanoutError),
          serverMessageId,
        });
        return null;
      });

      if (!inlineFanout) {
        const message = 'Canal sécurisé multi-appareil non prêt — message conservé localement.';
        updatePending({ status: 'waiting_secure_channel', lastError: message });
        throw new Error(message);
      }

      fanoutRows = inlineFanout.rows;
      fanoutHasTargets = inlineFanout.hasTargets;
      if (!fanoutHasTargets || fanoutRows.length === 0) {
        const message = 'Aucun appareil destinataire sécurisé disponible — message conservé localement.';
        trace('fanout_no_secure_target', { serverMessageId });
        updatePending({ status: 'waiting_secure_channel', lastError: message });
        throw new Error(message);
      }

      bodyToStore = buildMultiDeviceParentEnvelope(localId, traceId);
      trace('fanout_strict_ready', {
        rows: fanoutRows.length,
        hasTargets: fanoutHasTargets,
        serverMessageId,
      });
    }
'''
          text = text[:start] + replacement + text[end:]
          old = "    if (fanoutRows.length > 0 || fanoutTimedOut) rpcExtra.body_kind = 'multi_device';"
          if old not in text:
              raise RuntimeError('useMessageQueueSignal: body_kind marker not found')
          text = text.replace(old, "    if (encryptedSuccessfully) rpcExtra.body_kind = 'multi_device';", 1)
          text = text.replace('      storedMultiDeviceEnvelope: false,', '      storedMultiDeviceEnvelope: encryptedSuccessfully,', 1)
          write(path, text)

          # 2) Fan-out is all-or-nothing and every new bootstrap requires an OPK.
          path = 'src/lib/messaging/multiDeviceFanout.ts'
          replace_once(path, '''    if (options.useOneTimePrekey === false) {
      delete bundle.oneTimePrekey;
      delete bundle.oneTimePrekeyId;
    }
''', '''    if (
      !bundle.oneTimePrekey ||
      !Number.isSafeInteger(bundle.oneTimePrekeyId) ||
      (bundle.oneTimePrekeyId as number) <= 0
    ) {
      logCryptoError({
        severity: 'warning',
        context: 'fanout',
        errorCode: 'DEVICE_OPK_UNAVAILABLE',
        errorMessage: 'Strict X3DH5 requires a device one-time prekey',
        peerUserId: recipientUserId,
        peerDeviceId: recipientDeviceId,
      });
      return null;
    }
''')

          replace_once(path, '''    try {
      await establishDeviceSession(
        senderUserId, senderDeviceId,
        recipientUserId, recipientDeviceId,
        result.sharedSecret,
        undefined,
        {
          peerInitialDhPubB64: bundle.signedPrekey,
          isInitiator: true,
          peerSpkId: bundle.signedPrekeyId,
        },
      );
    } catch {}

    return parts.join('.');
''', '''    await establishDeviceSession(
      senderUserId, senderDeviceId,
      recipientUserId, recipientDeviceId,
      result.sharedSecret,
      undefined,
      {
        peerInitialDhPubB64: bundle.signedPrekey,
        isInitiator: true,
        peerSpkId: bundle.signedPrekeyId,
      },
    );

    return parts.join('.');
''')

          replace_once(path, '''    try {
      const spkPrivJwk = await hardCrypto.exportKey('jwk', spkKeyPair.privateKey);
      const spkPubRaw = await hardCrypto.exportKey('raw', spkKeyPair.publicKey);
      const spkPubB64 = bufferToBase64(spkPubRaw as ArrayBuffer);
      await establishDeviceSession(
        recipientUserId, myDeviceId,
        senderUserId, senderDeviceId,
        sharedSecret,
        undefined,
        {
          isInitiator: false,
          peerSpkId: parsed.spkId,
          selfInitialDhPrivJwk: spkPrivJwk,
          selfInitialDhPubB64: spkPubB64,
        },
      );
    } catch {}

    return new hardGlobals.TextDecoder().decode(pt);
''', '''    const spkPrivJwk = await hardCrypto.exportKey('jwk', spkKeyPair.privateKey);
    const spkPubRaw = await hardCrypto.exportKey('raw', spkKeyPair.publicKey);
    const spkPubB64 = bufferToBase64(spkPubRaw as ArrayBuffer);
    await establishDeviceSession(
      recipientUserId, myDeviceId,
      senderUserId, senderDeviceId,
      sharedSecret,
      undefined,
      {
        isInitiator: false,
        peerSpkId: parsed.spkId,
        selfInitialDhPrivJwk: spkPrivJwk,
        selfInitialDhPubB64: spkPubB64,
      },
    );

    return new hardGlobals.TextDecoder().decode(pt);
''')

          replace_once(path, '''  const rows = rowResults.filter(Boolean) as FanoutCopyRow[];
  return { rows, hasTargets: true };
''', '''  const rows = rowResults.filter(Boolean) as FanoutCopyRow[];
  if (rows.length !== targets.length) {
    logCryptoError({
      severity: 'error',
      context: 'fanout',
      errorCode: 'E_FANOUT_INCOMPLETE',
      errorMessage: 'Refusing to insert a parent message without a copy for every active trusted device',
      conversationId: input.conversationId,
      myDeviceId: senderDeviceId,
      metadata: {
        expectedTargets: targets.length,
        encryptedCopies: rows.length,
        missingCopies: targets.length - rows.length,
      },
    });
    throw new Error(`E_FANOUT_INCOMPLETE:${rows.length}/${targets.length}`);
  }
  return { rows, hasTargets: true };
''')

          # 3) Never acknowledge a ratchet transition unless IndexedDB committed.
          path = 'src/lib/crypto/deviceRatchet.ts'
          replace_once(path, '''async function saveSession(key: string, session: StoredSession): Promise<void> {
  try {
    await runTxOn('device-sessions', [STORE], 'readwrite', (tx) => {
      tx.objectStore(STORE).put({ ...session, id: key });
    });
  } catch {
    // non-fatal
  }
}
''', '''async function saveSession(key: string, session: StoredSession): Promise<void> {
  await runTxOn('device-sessions', [STORE], 'readwrite', (tx) => {
    tx.objectStore(STORE).put({ ...session, id: key });
  });
}
''')

          # 4) Registration uses account-scoped device KX only, retires account
          # SPKs, and signs the current device with the account Ed25519 root.
          path = 'src/hooks/useDeviceRegistration.ts'
          text = read(path)
          text = text.replace('  refreshSignedPrekeyIfNeeded,\n', '', 1)
          if text.count('loadDeviceKxKey(deviceId)') != 2:
              raise RuntimeError('useDeviceRegistration: expected two unscoped loadDeviceKxKey calls')
          text = text.replace('loadDeviceKxKey(deviceId)', 'loadDeviceKxKey(deviceId, user.id)')
          if text.count('getOrCreateDeviceKxKey(deviceId)') != 1:
              raise RuntimeError('useDeviceRegistration: expected one unscoped getOrCreateDeviceKxKey call')
          text = text.replace('getOrCreateDeviceKxKey(deviceId)', 'getOrCreateDeviceKxKey(deviceId, user.id)', 1)

          legacy_start = text.index('        // 2. Ensure the legacy/shared Signed PreKey also exists.')
          legacy_end = text.index('\n\n        // 3. Ensure a per-device Signed PreKey', legacy_start)
          text = text[:legacy_start] + '        // 2. Ensure a per-device Signed PreKey exists and is fresh.' + text[legacy_end + 2 + len('        // 3. Ensure a per-device Signed PreKey exists & is fresh.'):]

          anchor = '''        // 5. Publish the canonical signed device list (L4 / P1 — peers route
'''
          if anchor not in text:
              raise RuntimeError('useDeviceRegistration: signed-list anchor missing')
          signing_block = '''        // Sign this device with the account Ed25519 trust root. Device KX keys
        // are X25519 and must never be interpreted as signing keys.
        try {
          if (!devicePublicKeyB64) throw new Error('DEVICE_PUBLIC_KEY_MISSING');
          const { data: primaryRow } = await supabase
            .from('user_devices')
            .select('device_id')
            .eq('user_id', user.id)
            .eq('is_primary', true)
            .eq('is_active', true)
            .is('revoked_at', null)
            .limit(1)
            .maybeSingle();
          const { signCompanionDevice, publishCompanionSignature } = await import('@/lib/crypto/signedDeviceList');
          const signedRow = await signCompanionDevice({
            userId: user.id,
            primaryDeviceId: (primaryRow as any)?.device_id ?? deviceId,
            primaryEdPrivate: keys.signingPrivateKey,
            primaryEdPublicB64: bundle.signingKey,
            companionDeviceId: deviceId,
            companionPublicKeyB64: devicePublicKeyB64,
          });
          await publishCompanionSignature(signedRow);
        } catch (signErr) {
          console.warn('[useDeviceRegistration] device trust-root signature publish failed:', signErr);
        }

'''
          text = text.replace(anchor, signing_block + anchor, 1)
          text = text.replace('Non-fatal: X3DH gracefully degrades to 3-DH when no OPK is available.', 'Non-fatal here, but strict X3DH5 sending remains blocked until OPKs are available.', 1)
          write(path, text)

          # 5) Verify device signatures with the account Ed25519 signing key,
          # never with the X25519 device transport key.
          path = 'src/lib/crypto/signedDeviceList.ts'
          replace_once(path, '''  const primary = list.find(e => e.isPrimary);
  const expectedPrimaryPub = primary ? null : null; // tracked below
''', '''  const primary = list.find(e => e.isPrimary);
  const { data: accountKeys } = await supabase
    .from('user_public_keys')
    .select('signing_key')
    .eq('user_id', userId)
    .eq('is_active', true)
    .maybeSingle();
  const expectedPrimaryPub = (accountKeys as { signing_key?: string } | null)?.signing_key ?? null;
''')
          replace_once(path, '''    if (primary && primary.devicePublicKey && e.primaryPubB64 !== primary.devicePublicKey) {
      results.push({ deviceId: e.deviceId, ok: false, reason: 'PRIMARY_PUB_MISMATCH' });
      continue;
    }
''', '''    if (!expectedPrimaryPub || e.primaryPubB64 !== expectedPrimaryPub) {
      results.push({ deviceId: e.deviceId, ok: false, reason: 'PRIMARY_PUB_MISMATCH' });
      continue;
    }
''')

          print('Applied audited E2EE delivery patches')
          PY

      - name: Install dependencies
        run: npm ci

      - name: Validate tests
        run: npm run test

      - name: Validate production build
        run: npm run build

      - name: Commit fixes
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/hooks/useMessageQueueSignal.ts src/lib/messaging/multiDeviceFanout.ts src/lib/crypto/deviceRatchet.ts src/hooks/useDeviceRegistration.ts src/lib/crypto/signedDeviceList.ts
          git diff --cached --check
          git commit -m "fix(e2ee): stabilize iOS Windows device delivery"
          git push origin HEAD:agent/cryptography-hardening
