name: Signal resource optimizer

on:
  push:
    branches:
      - perf/signal-resource-optimization

permissions:
  contents: write

jobs:
  optimize:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout optimization branch
        uses: actions/checkout@v4
        with:
          ref: perf/signal-resource-optimization
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Apply reviewed resource patch
        run: python3 scripts/apply-signal-resource-optimization.py

      - name: Install dependencies
        run: npm ci

      - name: Messaging regression tests
        run: npx vitest run src/hooks/__tests__/useMessageQueueArchive.test.ts src/components/messages/__tests__/decryptionServiceMultiDevice.test.ts src/components/messages/__tests__/decryptionNegativeCache.test.ts

      - name: Production build
        run: npm run build

      - name: Commit validated optimization
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git rm -f scripts/apply-signal-resource-optimization.py
          git rm -f .github/workflows/apply-signal-resource-optimization.yml || true
          git rm -f .github/workflows/signal-resource-optimizer.yml || true
          git add src/components/messages/ChatView.tsx \
            src/hooks/useMessageQueue.ts \
            src/lib/messaging/multiDeviceFanout.ts \
            src/components/messages/decryptionService.ts \
            src/lib/messaging/fanoutRepair.ts \
            src/e2ee-session/deviceRegistry.ts \
            src/lib/messaging/compressImage.ts
          git commit -m "perf(messaging): apply Signal-style resource optimizations"
          git push origin HEAD:perf/signal-resource-optimization
