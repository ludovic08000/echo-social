name: Patch master-key convergence

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/patch-master-key-convergence.yml

permissions:
  contents: write

jobs:
  patch-and-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Reuse the existing account master key
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path

          path = Path('src/lib/crypto/accountKeyBackup.ts')
          text = path.read_text(encoding='utf-8')
          start_marker = "      // If we don't have a Master Key yet, generate one and upload\n"
          end_marker = "      return 'local_ok';"
          start = text.index(start_marker)
          end = text.index(end_marker, start)

          replacement = '''      // All linked devices must converge on the SAME account Master Key.
      // If a backup exists, unwrap its key first and only then upload this
      // device's local state under that existing key. Generating a random key
      // here would make iOS and Windows archive keys mutually unreadable.
      if (!_sessionMasterKey) {
        const { data: existingBackup, error: existingBackupError } = await supabase
          .from('user_backups' as any)
          .select('salt, wrapped_master_key, master_key_iv, version, backup_type')
          .eq('user_id', userId)
          .eq('backup_type', 'account')
          .maybeSingle();

        if (existingBackupError) throw existingBackupError;

        if (existingBackup) {
          const backup = existingBackup as unknown as BackupRow;
          if (backup.version < 5 || !backup.salt || !backup.wrapped_master_key || !backup.master_key_iv) {
            logCryptoError({
              severity: 'error', context: 'backup', errorCode: 'BACKUP_MASTER_KEY_INCOMPATIBLE',
              errorMessage: 'Existing account backup cannot provide a convergent Master Key',
              metadata: { userId, version: backup.version },
            });
            return 'error';
          }

          const saltBuf = new Uint8Array(base64ToBuffer(backup.salt));
          const wrappingKey = await deriveWrappingKey(secret, saltBuf);
          const aad = backup.version >= 6
            ? buildBackupAAD(userId, 'account', backup.version)
            : undefined;
          const mkRaw = await unwrapMasterKey(
            backup.wrapped_master_key,
            backup.master_key_iv,
            wrappingKey,
            aad,
          );
          const mk = await importMasterKey(mkRaw);
          _sessionRawMasterKey = mkRaw;
          _sessionMasterKey = mk;
          dispatchSessionUnlocked(userId);

          // Keep the server snapshot current, but preserve the already
          // established account key shared by every linked device.
          void uploadBackup(mkRaw, mk, password, userId, 'account', secret).catch((e) => {
            logCryptoException('backup', e, {
              severity: 'warning',
              metadata: { stage: 'refresh_with_existing_master_key', userId },
            });
          });
        } else {
          const mkRaw = generateMasterKey();
          const mk = await importMasterKey(mkRaw);
          _sessionRawMasterKey = mkRaw;
          _sessionMasterKey = mk;
          dispatchSessionUnlocked(userId);
          void uploadBackup(mkRaw, mk, password, userId, 'account', secret).catch((e) => {
            logCryptoException('backup', e, {
              severity: 'warning',
              metadata: { stage: 'first_upload', userId },
            });
          });
        }
      }
'''

          patched = text[:start] + replacement + text[end:]
          if patched == text:
              raise SystemExit('accountKeyBackup.ts was not changed')
          path.write_text(patched, encoding='utf-8')
          PY

      - name: Guard convergence invariant
        shell: bash
        run: |
          python3 <<'PY'
          from pathlib import Path
          text = Path('src/lib/crypto/accountKeyBackup.ts').read_text(encoding='utf-8')
          local = text[text.index('export async function initAccountKeySync'):text.index('export async function restoreAccountKeysFromActiveSession')]
          assert "refresh_with_existing_master_key" in local
          assert ".select('salt, wrapped_master_key, master_key_iv, version, backup_type')" in local
          assert "if (existingBackup)" in local
          print('Master-key convergence guard: OK')
          PY

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: E2EE tests
        run: npm test -- --run src/lib/crypto/__tests__/backup.test.ts src/lib/crypto/__tests__/multiDeviceIntegration.test.ts src/lib/messaging/__tests__/crossPlatformV5DeviceCopy.test.ts

      - name: Build
        run: npm run build

      - name: Commit verified patch and remove temporary workflow
        shell: bash
        run: |
          rm -f .github/workflows/patch-master-key-convergence.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/crypto/accountKeyBackup.ts .github/workflows/patch-master-key-convergence.yml
          git commit -m "fix(e2ee): converge account master key across devices"
          git push origin HEAD:main
