name: Deploy E2EE Backup Vault

on:
  push:
    branches: [main]
    paths:
      - supabase/functions/e2ee-backup-vault/**
      - supabase/functions/_shared/rate-limit.ts
      - .github/workflows/deploy-e2ee-backup-vault.yml
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-e2ee-backup-vault
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: vkpmoqfzrihcijjochks

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify deployment credentials
        shell: bash
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing GitHub secret: SUPABASE_ACCESS_TOKEN" >&2
            exit 1
          fi

      - name: Install Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Function
        run: supabase functions deploy e2ee-backup-vault --project-ref "$PROJECT_REF" --no-verify-jwt

      - name: Verify unauthenticated rejection
        shell: bash
        run: |
          endpoint="https://${PROJECT_REF}.supabase.co/functions/v1/e2ee-backup-vault"
          status=$(curl --silent --show-error --output /tmp/vault-response.json --write-out "%{http_code}" \
            --request POST "$endpoint" \
            --header "Content-Type: application/json" \
            --data '{"action":"get","backup_type":"account"}')
          cat /tmp/vault-response.json
          if [ "$status" != "401" ]; then
            echo "Expected HTTP 401, received $status" >&2
            exit 1
          fi

      - name: Record successful deployment
        shell: bash
        run: |
          mkdir -p supabase/.deploy
          cat > supabase/.deploy/e2ee-backup-vault.json <<EOF
          {
            "project_ref": "$PROJECT_REF",
            "function": "e2ee-backup-vault",
            "source_commit": "$GITHUB_SHA",
            "deployed_at": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "verification": "unauthenticated_request_returned_401"
          }
          EOF
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add supabase/.deploy/e2ee-backup-vault.json
          git commit -m "chore(supabase): mark e2ee backup vault deployment"
          git push origin HEAD:main
