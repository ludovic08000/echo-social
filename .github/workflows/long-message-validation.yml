name: Long Message Validation

on:
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Targeted lint
        id: lint
        continue-on-error: true
        run: |
          mkdir -p validation-results
          bunx eslint \
            src/components/messages/decryptionService.ts \
            src/hooks/useMessageQueueSignal.ts \
            src/lib/messageAntiSpam.ts \
            src/lib/messaging/longMessageAttachment.ts \
            src/lib/messaging/__tests__/longMessageAttachment.test.ts \
            src/lib/messaging/__tests__/longMessageAntiSpam.test.ts \
            --format json --output-file validation-results/lint.json

      - name: Targeted tests
        id: tests
        continue-on-error: true
        run: |
          set -o pipefail
          bun run vitest run \
            src/lib/messaging/__tests__/longMessageAttachment.test.ts \
            src/lib/messaging/__tests__/longMessageAntiSpam.test.ts \
            2>&1 | tee validation-results/tests.log

      - name: Production build
        id: build
        continue-on-error: true
        run: |
          set -o pipefail
          bun run build 2>&1 | tee validation-results/build.log

      - name: Upload validation reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: long-message-validation-${{ github.run_id }}
          path: validation-results/
          retention-days: 2
          if-no-files-found: warn

      - name: Enforce validation
        if: steps.lint.outcome == 'failure' || steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          node - <<'NODE'
          const fs = require('fs');
          const failures = [];
          if ('${{ steps.lint.outcome }}' === 'failure') {
            const report = JSON.parse(fs.readFileSync('validation-results/lint.json', 'utf8'));
            failures.push(...report.flatMap(file => file.messages
              .filter(message => message.severity === 2)
              .map(message => `${file.filePath}:${message.line}:${message.column} ${message.ruleId || 'parse'} ${message.message}`)));
          }
          for (const [name, outcome, path] of [
            ['tests', '${{ steps.tests.outcome }}', 'validation-results/tests.log'],
            ['build', '${{ steps.build.outcome }}', 'validation-results/build.log'],
          ]) {
            if (outcome !== 'failure') continue;
            const lines = fs.readFileSync(path, 'utf8').trim().split(/\r?\n/);
            failures.push(`${name} failed:\n${lines.slice(-60).join('\n')}`);
          }
          console.error(failures.slice(0, 80).join('\n'));
          process.exit(1);
          NODE
